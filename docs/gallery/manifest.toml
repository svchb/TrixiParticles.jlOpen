# Gallery manifest
#
# This file intentionally uses a small schema.
#
# Required per-entry fields:
# - id
# - title
# - example
# - asset_strategy
#
# Derived by convention:
# - category        := first path component of `example`
# - outputs         := asset strategy defaults unless overridden per entry
# - media_repo_path := "{category}/{id}"
#
# Optional per-entry fields, only when an example really needs them:
# - caption = "..."
# - outputs = ["poster"] or ["poster", "gif"]
# - [entries.run]
#   - overrides = { tspan = [0.0, 0.2], fluid_particle_spacing = 0.01 }
#   - save_dt = 0.02
#   - use this for time-span changes, resolution changes, and similar `trixi_include` kwargs
#   - `tspan = [t0, t1]` is converted to a tuple before calling `trixi_include`
#   - `save_dt` is optional and overrides the example's `SolutionSavingCallback(dt=...)`
# - [entries.render]
# - notes = "..."

schema_version = 1

[render_defaults]
background = "white"
color_scheme = "viridis"

[path_conventions]
derive_category_from_example = true
derive_outputs_from_asset_strategy = true
media_repo_path_pattern = "{category}/{id}"

# Example optional run configuration:
#
# [[entries]]
# id = "fluid_dam_break_2d"
# title = "Dam Break 2D"
# example = "fluid/dam_break_2d.jl"
# asset_strategy = "paraview_animation"
#
# [entries.run]
# overrides = { tspan = [0.0, 0.2], fluid_particle_spacing = 0.01 }
# save_dt = 0.02

[asset_strategies.paraview_animation]
render_backend = "paraview"
outputs = ["poster", "gif"]

[asset_strategies.paraview_poster]
render_backend = "paraview"
outputs = ["poster"]

[asset_strategies.julia_plot_poster]
render_backend = "julia"
outputs = ["poster"]

[asset_strategies.benchmark_poster]
render_backend = "julia"
outputs = ["poster"]

